version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: transport_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transport_backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/transport_booking
      - CORS_ORIGIN=http://localhost:5173
      - JWT_SECRET=your_jwt_secret_change_me_in_production
      - SEAT_HOLD_TTL_MINUTES=15
      - SMTP_HOST=smtp.ethereal.email
      - SMTP_PORT=587
      - SMTP_USER=your_smtp_username
      - SMTP_PASS=your_smtp_password
      - OTP_EXPIRY_MINUTES=15
    depends_on:
      - mongo
    restart: unless-stopped
    # Nếu bạn muốn chạy seed tự động khi start, bạn có thể comment dòng command mặc định
    # command: sh -c "npm run seed && npm run seed:search && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3000/api
        - NEXT_PUBLIC_APP_URL=http://localhost:5173
    container_name: transport_frontend
    ports:
      - "5173:5173"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
      - NEXT_PUBLIC_APP_URL=http://localhost:5173
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
